<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subdomain Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    /* ---- Header ---- */
    header { text-align: center; margin-bottom: 2rem; }

    header h1 {
      font-size: 2.2rem;
      color: #38bdf8;
      letter-spacing: 0.04em;
    }

    header p {
      color: #94a3b8;
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }

    /* ---- Card ---- */
    .card {
      background: #1e293b;
      border-radius: 14px;
      padding: 1.8rem 2rem;
      width: 100%;
      max-width: 780px;
      box-shadow: 0 6px 30px rgba(0,0,0,0.45);
    }

    /* ---- Input Row ---- */
    .input-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .input-row input[type="text"] {
      flex: 1;
      min-width: 200px;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input[type="text"]:focus { border-color: #38bdf8; }

    .input-row button {
      padding: 0.7rem 1.6rem;
      border-radius: 8px;
      border: none;
      background: #38bdf8;
      color: #0f172a;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #7dd3fc; }
    .input-row button:disabled { background: #64748b; cursor: not-allowed; }

    /* ---- Source Selector ---- */
    .source-section {
      margin-top: 1rem;
    }

    .source-section summary {
      cursor: pointer;
      color: #94a3b8;
      font-size: 0.9rem;
      user-select: none;
    }

    .source-section summary:hover { color: #e2e8f0; }

    .source-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 0.4rem 1rem;
      margin-top: 0.6rem;
    }

    .source-grid label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.88rem;
      color: #cbd5e1;
      cursor: pointer;
    }

    .source-grid input[type="checkbox"] { accent-color: #38bdf8; }

    /* ---- Status ---- */
    #status {
      margin-top: 1rem;
      min-height: 1.4rem;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    #status.error { color: #f87171; }

    /* ---- Toolbar (filter + actions) ---- */
    .toolbar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 1.4rem;
      margin-bottom: 0.6rem;
    }

    .toolbar h2 {
      font-size: 1rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: auto;
    }

    .badge {
      background: #0ea5e9;
      color: #0f172a;
      font-size: 0.78rem;
      font-weight: 700;
      border-radius: 999px;
      padding: 0.15rem 0.6rem;
      vertical-align: middle;
      margin-left: 0.3rem;
    }

    .filter-input {
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.85rem;
      outline: none;
      width: 170px;
      transition: border-color 0.2s;
    }

    .filter-input:focus { border-color: #38bdf8; }

    .action-btn {
      font-size: 0.8rem;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.15s;
    }

    .action-btn:hover { background: #334155; color: #e2e8f0; }

    /* ---- Subdomain List ---- */
    #subdomain-list {
      list-style: none;
      max-height: 420px;
      overflow-y: auto;
      border-radius: 8px;
      border: 1px solid #334155;
    }

    #subdomain-list::-webkit-scrollbar { width: 6px; }
    #subdomain-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    #subdomain-list li {
      padding: 0.55rem 0.9rem;
      font-size: 0.92rem;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.15s;
    }

    #subdomain-list li:last-child { border-bottom: none; }
    #subdomain-list li:hover { background: #0f172a; }

    #subdomain-list li .sd-name {
      flex: 1;
      font-family: 'Courier New', monospace;
    }

    #subdomain-list li a {
      color: #7dd3fc;
      text-decoration: none;
    }

    #subdomain-list li a:hover { text-decoration: underline; }

    .source-tag {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      background: #334155;
      color: #94a3b8;
      white-space: nowrap;
    }

    .source-tag.crtsh       { background: #164e63; color: #67e8f9; }
    .source-tag.hackertarget { background: #1e3a2f; color: #6ee7b7; }
    .source-tag.alienvault  { background: #3b1f4e; color: #c4b5fd; }
    .source-tag.urlscan     { background: #422006; color: #fbbf24; }
    .source-tag.webarchive  { background: #1e1b4b; color: #a5b4fc; }
    .source-tag.bruteforce  { background: #4c1d1d; color: #fca5a5; }

    .copy-btn {
      font-size: 0.72rem;
      padding: 0.12rem 0.45rem;
      border-radius: 4px;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .copy-btn:hover { background: #334155; color: #e2e8f0; }

    /* ---- Spinner ---- */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #94a3b8;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Footer note ---- */
    .sources-note {
      margin-top: 1.4rem;
      font-size: 0.78rem;
      color: #475569;
      text-align: center;
      line-height: 1.6;
    }

    /* ---- Responsive ---- */
    @media (max-width: 520px) {
      header h1 { font-size: 1.5rem; }
      .card { padding: 1.2rem 1rem; }
      .toolbar { flex-direction: column; align-items: flex-start; }
      .filter-input { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🔍 Subdomain Finder</h1>
    <p>Discover subdomains from multiple public intelligence sources</p>
  </header>

  <div class="card">
    <!-- Domain input -->
    <div class="input-row">
      <input type="text" id="domain" placeholder="e.g. example.com" autocomplete="off" />
      <button id="find-btn">Find Subdomains</button>
    </div>

    <!-- Source selection -->
    <details class="source-section" open>
      <summary>Select sources</summary>
      <div class="source-grid" id="source-grid">
        <!-- Populated dynamically from /sources -->
      </div>
    </details>

    <div id="status"></div>

    <!-- Results -->
    <div id="results-container" style="display:none">
      <div class="toolbar">
        <h2>Results <span id="count-badge" class="badge">0</span></h2>
        <input type="text" class="filter-input" id="filter-input" placeholder="Filter results…" />
        <button class="action-btn" id="copy-all-btn">Copy All</button>
        <button class="action-btn" id="download-btn">Download TXT</button>
      </div>
      <ul id="subdomain-list"></ul>
    </div>

    <p class="sources-note">
      Powered by <strong>crt.sh</strong> &bull; <strong>HackerTarget</strong> &bull;
      <strong>AlienVault OTX</strong> &bull; <strong>URLScan.io</strong> &bull;
      <strong>Web Archive</strong> &bull; <strong>DNS Brute-force</strong>
    </p>
  </div>

  <script>
    /* ====================================================================
       State
       ==================================================================== */
    let allResults = [];     // Array of { subdomain, sources }
    let sourceMap  = {};     // key -> { label }

    const SOURCE_CSS = {
      "crt.sh":          "crtsh",
      "HackerTarget":    "hackertarget",
      "AlienVault OTX":  "alienvault",
      "URLScan.io":      "urlscan",
      "Web Archive":     "webarchive",
      "DNS Brute-force": "bruteforce",
    };

    /* ====================================================================
       Initialise: fetch sources and build checkboxes
       ==================================================================== */
    (async function init() {
      try {
        const resp = await fetch("/sources");
        sourceMap  = await resp.json();
      } catch {
        sourceMap = {};
      }

      const grid = document.getElementById("source-grid");
      for (const [key, meta] of Object.entries(sourceMap)) {
        const id  = "src-" + key;
        const lbl = document.createElement("label");
        lbl.innerHTML =
          '<input type="checkbox" id="' + id + '" value="' + key + '" ' +
          (key !== "bruteforce" ? "checked" : "") + " />" +
          meta.label;
        grid.appendChild(lbl);
      }
    })();

    /* ====================================================================
       DOM references & listeners
       ==================================================================== */
    const domainInput   = document.getElementById("domain");
    const findBtn       = document.getElementById("find-btn");
    const filterInput   = document.getElementById("filter-input");
    const copyAllBtn    = document.getElementById("copy-all-btn");
    const downloadBtn   = document.getElementById("download-btn");

    domainInput.addEventListener("keydown", e => { if (e.key === "Enter") findSubdomains(); });
    findBtn.addEventListener("click", findSubdomains);
    filterInput.addEventListener("input", renderList);
    copyAllBtn.addEventListener("click", copyAll);
    downloadBtn.addEventListener("click", downloadTxt);

    /* ====================================================================
       Status helper
       ==================================================================== */
    function setStatus(msg, isError) {
      const el = document.getElementById("status");
      el.innerHTML  = msg;
      el.className  = isError ? "error" : "";
    }

    /* ====================================================================
       Main search
       ==================================================================== */
    async function findSubdomains() {
      const domain = domainInput.value.trim().toLowerCase();
      if (!domain) { setStatus("Please enter a domain.", true); return; }

      // Collect selected sources
      const checked = [...document.querySelectorAll('#source-grid input[type="checkbox"]:checked')]
        .map(cb => cb.value);
      if (checked.length === 0) { setStatus("Select at least one source.", true); return; }

      // Reset
      allResults = [];
      document.getElementById("results-container").style.display = "none";
      document.getElementById("subdomain-list").innerHTML = "";
      filterInput.value = "";
      findBtn.disabled = true;
      setStatus('<span class="spinner"></span>Querying ' + checked.length + " source(s)&hellip;");

      try {
        const resp = await fetch("/find", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ domain, sources: checked }),
        });
        const data = await resp.json();
        findBtn.disabled = false;

        if (data.error) { setStatus(data.error, true); return; }

        allResults = data.results || [];
        if (allResults.length === 0) { setStatus("No subdomains found."); return; }

        document.getElementById("count-badge").textContent = data.count;
        document.getElementById("results-container").style.display = "block";
        setStatus("");
        renderList();
      } catch {
        findBtn.disabled = false;
        setStatus("Request failed. Is the server running?", true);
      }
    }

    /* ====================================================================
       Render results list (with optional filter)
       ==================================================================== */
    function renderList() {
      const query = filterInput.value.trim().toLowerCase();
      const list  = document.getElementById("subdomain-list");
      list.innerHTML = "";

      const filtered = query
        ? allResults.filter(r => r.subdomain.includes(query))
        : allResults;

      for (const item of filtered) {
        const li = document.createElement("li");

        // Subdomain link
        const span = document.createElement("span");
        span.className = "sd-name";
        const a = document.createElement("a");
        a.href = "https://" + item.subdomain;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = item.subdomain;
        span.appendChild(a);
        li.appendChild(span);

        // Source tags
        for (const src of item.sources) {
          const tag = document.createElement("span");
          tag.className = "source-tag " + (SOURCE_CSS[src] || "");
          tag.textContent = src;
          li.appendChild(tag);
        }

        // Copy button
        const btn = document.createElement("button");
        btn.className = "copy-btn";
        btn.textContent = "Copy";
        btn.addEventListener("click", () => copyText(item.subdomain, btn));
        li.appendChild(btn);

        list.appendChild(li);
      }

      // Update visible count
      document.getElementById("count-badge").textContent = filtered.length;
    }

    /* ====================================================================
       Clipboard helpers
       ==================================================================== */
    function copyText(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = "Copied!";
        setTimeout(() => (btn.textContent = orig), 1200);
      });
    }

    function copyAll() {
      const text = allResults.map(r => r.subdomain).join("\n");
      navigator.clipboard.writeText(text).then(() => {
        copyAllBtn.textContent = "Copied!";
        setTimeout(() => (copyAllBtn.textContent = "Copy All"), 1200);
      });
    }

    /* ====================================================================
       Download as TXT
       ==================================================================== */
    function downloadTxt() {
      const text = allResults.map(r => r.subdomain).join("\n");
      const blob = new Blob([text], { type: "text/plain" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = domainInput.value.trim().toLowerCase().replace(/\./g, "_") + "_subdomains.txt";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
